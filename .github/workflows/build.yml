name: Build Endless, Beloved APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Extract project bundle
        env:
          BUNDLE_B64: 
        run: |
          echo "$BUNDLE_B64" | base64 -d > eb-bundle.zip
          unzip -q eb-bundle.zip
          cp -r eb-bundle/css eb-bundle/js eb-bundle/data eb-bundle/story eb-bundle/art eb-bundle/manifest.json eb-bundle/index.html .
          cp -r eb-bundle/android .
      - name: Copy web assets into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r css js data story art manifest.json index.html android/app/src/main/assets/
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: EBeloved2024!
          KEY_ALIAS:         endlessbeloved
          KEY_PASSWORD:      EBeloved2024!
        run: gradle assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EndlessBeloved-release
          path: android/app/build/outputs/apk/release/app-release.apk
