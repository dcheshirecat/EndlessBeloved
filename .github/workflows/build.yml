name: Build Endless, Beloved APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write all project files
        run: |
          # Folders
          mkdir -p android/app/src/main/assets/css
          mkdir -p android/app/src/main/assets/js/systems
          mkdir -p android/app/src/main/assets/js/ui
          mkdir -p android/app/src/main/assets/data
          mkdir -p android/app/src/main/assets/story/oracle
          mkdir -p android/app/src/main/assets/art/ui
          mkdir -p android/app/src/main/assets/art/characters
          mkdir -p android/app/src/main/java/com/endlessbeloved/app
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/xml

          # Keystore
          echo "" | base64 -d > android/app/keystore.jks

          # Web — HTML/CSS/manifest
          echo ""    | base64 -d > android/app/src/main/assets/index.html
          echo ""    | base64 -d > android/app/src/main/assets/css/style.css
          echo "" | base64 -d > android/app/src/main/assets/manifest.json

          # JS systems
          echo ""  | base64 -d > android/app/src/main/assets/js/systems/AppVariant.js
          echo ""   | base64 -d > android/app/src/main/assets/js/systems/GameState.js
          echo ""  | base64 -d > android/app/src/main/assets/js/systems/SaveSystem.js
          echo ""    | base64 -d > android/app/src/main/assets/js/systems/RouteManager.js
          echo "" | base64 -d > android/app/src/main/assets/js/systems/StoryLoader.js
          echo ""    | base64 -d > android/app/src/main/assets/js/systems/DialogueSystem.js
          echo ""    | base64 -d > android/app/src/main/assets/js/systems/AltarManager.js
          echo ""    | base64 -d > android/app/src/main/assets/js/systems/SpellSystem.js
          echo ""    | base64 -d > android/app/src/main/assets/js/systems/SkillSystem.js
          echo ""     | base64 -d > android/app/src/main/assets/js/systems/GameManager.js
          echo ""        | base64 -d > android/app/src/main/assets/js/main.js

          # JS UI
          echo "" | base64 -d > android/app/src/main/assets/js/ui/MainMenu.js
          echo ""  | base64 -d > android/app/src/main/assets/js/ui/NewGame.js
          echo "" | base64 -d > android/app/src/main/assets/js/ui/LoadGame.js
          echo "" | base64 -d > android/app/src/main/assets/js/ui/RouteSelect.js
          echo ""     | base64 -d > android/app/src/main/assets/js/ui/Game.js

          # Data
          echo ""   | base64 -d > android/app/src/main/assets/data/characters.json
          echo ""  | base64 -d > android/app/src/main/assets/data/spells.json
          echo ""  | base64 -d > android/app/src/main/assets/data/skills.json
          echo "" | base64 -d > android/app/src/main/assets/story/oracle/chapter_01.json

          # Android wrapper
          echo "" | base64 -d > android/app/src/main/java/com/endlessbeloved/app/MainActivity.java
          echo "PHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPkVuZGxlc3MsIEJlbG92ZWQ8L3N0cmluZz4KPC9yZXNvdXJjZXM+Cg=="      | base64 -d > android/app/src/main/res/values/strings.xml
          echo ""     | base64 -d > android/app/build.gradle
          echo "YnVpbGRzY3JpcHQgewogICAgcmVwb3NpdG9yaWVzIHsgZ29vZ2xlKCk7IG1hdmVuQ2VudHJhbCgpIH0KICAgIGRlcGVuZGVuY2llcyB7IGNsYXNzcGF0aCAnY29tLmFuZHJvaWQudG9vbHMuYnVpbGQ6Z3JhZGxlOjguMi4wJyB9Cn0KYWxscHJvamVjdHMgewogICAgcmVwb3NpdG9yaWVzIHsgZ29vZ2xlKCk7IG1hdmVuQ2VudHJhbCgpIH0KfQo="    | base64 -d > android/build.gradle
          echo "aW5jbHVkZSAnOmFwcCcK"     | base64 -d > android/settings.gradle
          echo "YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCg=="  | base64 -d > android/gradle.properties

          # AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="@string/app_name"
                  android:allowBackup="true"
                  android:supportsRtl="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH:     app/keystore.jks
          KEYSTORE_PASSWORD: EBeloved2024!
          KEY_ALIAS:         endlessbeloved
          KEY_PASSWORD:      EBeloved2024!
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EndlessBeloved-release
          path: android/app/build/outputs/apk/release/app-release.apk
